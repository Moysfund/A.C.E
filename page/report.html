<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Reports - LASBCA A.C.E.</title>
    <link rel="stylesheet" href="../styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        body { background: #0b0f1a; color: #eef2f8; font-family: 'Inter', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .page-container { padding: 90px 20px 30px; max-width: 1200px; margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .page-header h1 { font-size: 1.8rem; font-weight: 800; }
        .page-header h1 i { color: #00d4ff; margin-right: 10px; }
        .btn-back { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); padding: 0.5rem 1.2rem; border-radius: 40px; color: #eef2f8; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; transition: 0.2s; }
        .btn-back:hover { background: rgba(255,255,255,0.06); }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0088cc); border: none; padding: 0.5rem 1.5rem; border-radius: 40px; color: #0b0f1a; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.85rem; transition: 0.2s; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 4px 16px rgba(0,212,255,0.3); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 0.8rem 1rem;
            text-align: center;
        }
        .stat-card .number { font-size: 1.5rem; font-weight: 800; color: #00d4ff; display: block; }
        .stat-card .label { font-size: 0.65rem; color: #5a6f92; text-transform: uppercase; letter-spacing: 1px; }

        .filters {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .filters input, .filters select {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 40px;
            color: #eef2f8;
            font-family: 'Inter', sans-serif;
            flex: 1;
            min-width: 150px;
            font-size: 0.85rem;
        }
        .filters input:focus, .filters select:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .table-wrap {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 0 1rem;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { text-align: left; padding: 0.6rem 0.3rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: #5a6f92; font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; }
        td { padding: 0.6rem 0.3rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        tr:hover td { background: rgba(0,212,255,0.01); }
        .badge-status { padding: 0.1rem 0.6rem; border-radius: 20px; font-size: 0.6rem; font-weight: 600; }
        .badge-status.submitted { background: rgba(76,175,80,0.12); color: #4caf50; }
        .badge-status.approved { background: rgba(76,175,80,0.12); color: #4caf50; }
        .badge-status.pending { background: rgba(255,193,7,0.12); color: #ffc107; }
        .badge-status.contravention { background: rgba(255,107,107,0.12); color: #ff6b6b; }
        .badge-status.active { background: rgba(255,107,107,0.12); color: #ff6b6b; }
        .badge-status.pass { background: rgba(76,175,80,0.12); color: #4caf50; }
        .badge-status.partial { background: rgba(255,193,7,0.12); color: #ffc107; }
        .badge-status.fail { background: rgba(255,107,107,0.12); color: #ff6b6b; }
        .actions button { background: none; border: none; color: #5a6f92; cursor: pointer; padding: 0.1rem 0.4rem; transition: 0.2s; }
        .actions button:hover { color: #00d4ff; }

        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: #5a6f92;
        }
        .empty-state i { font-size: 3rem; color: #00d4ff; opacity: 0.3; margin-bottom: 0.5rem; }
        .empty-state h3 { color: #889bc2; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(11,15,26,0.9); backdrop-filter: blur(12px); border: 1px solid rgba(0,212,255,0.15); padding: 0.6rem 2rem; border-radius: 40px; color: #eef2f8; font-weight: 600; z-index: 2000; display: none; font-size: 0.8rem; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .toast.show { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        .lasbca-badge {
            background: #0b1a2b;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            padding: 3px 14px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            display: inline-block;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-bar" style="position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:0.6rem 1.5rem;background:rgba(11,15,26,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(0,212,255,0.08);">
        <div class="logo" style="display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.1rem;color:#f5f8ff;">
            <span class="lasbca-badge">LASBCA</span>
            <span style="font-size:1.2rem;">⚡</span>
            <span style="font-weight:800;">A.C.E.</span>
            <span style="font-weight:400;font-size:0.6rem;color:#889bc2;letter-spacing:1px;display:none;">Reports</span>
        </div>
        <div class="top-actions" style="display:flex;gap:0.8rem;align-items:center;">
            <span class="badge" style="background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.12);padding:0.2rem 0.8rem;border-radius:40px;font-size:0.6rem;font-weight:600;color:#00d4ff;display:none;">EPPPS Live</span>
            <div class="user" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.03);padding:0.2rem 0.8rem 0.2rem 0.5rem;border-radius:40px;border:1px solid rgba(255,255,255,0.04);font-size:0.7rem;">
                <i class="fas fa-user-cog" style="color:#889bc2;"></i>
                <span>Team A</span>
            </div>
            <button onclick="window.location.href='dashboard.html'" style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:0.2rem 0.8rem;border-radius:40px;color:#889bc2;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.65rem;">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="page-container">

        <div class="page-header">
            <h1><i class="fas fa-file-alt"></i> All Reports</h1>
            <div style="display:flex;gap:0.8rem;flex-wrap:wrap;">
                <button onclick="window.location.href='stage-report.html'" class="btn-primary"><i class="fas fa-plus"></i> New Report</button>
                <button onclick="window.location.href='dashboard.html'" class="btn-back"><i class="fas fa-arrow-left"></i> Back</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card"><span class="number" id="stageCount">0</span><div class="label">Stage Reports</div></div>
            <div class="stat-card"><span class="number" id="contraCount">0</span><div class="label">Contraventions</div></div>
            <div class="stat-card"><span class="number" id="pcaCount">0</span><div class="label">PCA Audits</div></div>
            <div class="stat-card"><span class="number" id="totalCount">0</span><div class="label">Total Reports</div></div>
        </div>

        <!-- Filters -->
        <div class="filters">
            <input type="text" id="searchInput" placeholder="🔍 Search by project or file number..." />
            <select id="typeFilter">
                <option value="all">All Types</option>
                <option value="Stage Report">Stage Reports</option>
                <option value="Contravention">Contraventions</option>
                <option value="PCA Audit">PCA Audits</option>
            </select>
        </div>

        <!-- Table -->
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>File No.</th>
                        <th>Project</th>
                        <th>Type</th>
                        <th>Stage</th>
                        <th>Team</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Rendered by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="../storage.js"></script>

    <script>
        function loadReports() {
            const stageReports = getStageReports();
            const contraventions = getContraventions();
            const pcaAudits = getPCAAudits();

            document.getElementById('stageCount').textContent = stageReports.length;
            document.getElementById('contraCount').textContent = contraventions.length;
            document.getElementById('pcaCount').textContent = pcaAudits.length;
            document.getElementById('totalCount').textContent = stageReports.length + contraventions.length + pcaAudits.length;

            const allReports = [
                ...stageReports.map(r => ({ ...r, type: 'Stage Report', status: r.status || 'Submitted' })),
                ...contraventions.map(r => ({ ...r, type: 'Contravention', status: r.status || 'Active' })),
                ...pcaAudits.map(r => ({ ...r, type: 'PCA Audit', status: r.status || 'Pass' }))
            ];

            allReports.sort((a, b) => new Date(b.submittedAt || b.reportDate) - new Date(a.submittedAt || a.reportDate));

            const tbody = document.getElementById('tableBody');

            if (allReports.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-file-alt"></i>
                                <h3>No Reports Found</h3>
                                <p>Create your first report using the Stage Report, Contravention, or PCA Audit forms.</p>
                                <div style="margin-top:1rem;display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;">
                                    <button onclick="window.location.href='stage-report.html'" style="background:rgba(0,212,255,0.1);border:1px solid rgba(0,212,255,0.2);padding:0.4rem 1.2rem;border-radius:40px;color:#00d4ff;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.8rem;">
                                        <i class="fas fa-camera"></i> Stage Report
                                    </button>
                                    <button onclick="window.location.href='contravention.html'" style="background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.2);padding:0.4rem 1.2rem;border-radius:40px;color:#ff6b6b;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.8rem;">
                                        <i class="fas fa-exclamation-triangle"></i> Contravention
                                    </button>
                                    <button onclick="window.location.href='pca-audit.html'" style="background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.2);padding:0.4rem 1.2rem;border-radius:40px;color:#4caf50;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.8rem;">
                                        <i class="fas fa-clipboard-check"></i> PCA Audit
                                    </button>
                                </div>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = allReports.map(r => `
                <tr>
                    <td style="font-weight:600;font-size:0.7rem;color:#00d4ff;">${r.fileNo || r.id || 'N/A'}</td>
                    <td style="font-weight:600;">${r.project || r.address || 'N/A'}</td>
                    <td><span style="color:${r.type === 'Contravention' ? '#ff6b6b' : '#00d4ff'};">${r.type}</span></td>
                    <td>${r.stageNumber || r.stageType || 'N/A'}</td>
                    <td>${r.team || 'N/A'}</td>
                    <td><span class="badge-status ${(r.status || 'submitted').toLowerCase()}">${r.status || 'Submitted'}</span></td>
                    <td style="font-size:0.7rem;color:#5a6f92;">${r.reportDate || r.date || r.submittedAt?.split('T')[0] || 'N/A'}</td>
                    <td class="actions">
                        <button onclick="showToast('📄 Viewing ${r.fileNo || r.id}')" title="View"><i class="fas fa-eye"></i></button>
                        <button onclick="deleteReport('${r.id}')" title="Delete"><i class="fas fa-trash" style="color:#ff6b6b;"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        // Search and filter
        document.getElementById('searchInput').addEventListener('input', function() {
            const search = this.value.toLowerCase();
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(search) ? '' : 'none';
            });
        });

        document.getElementById('typeFilter').addEventListener('change', function() {
            const filter = this.value;
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach(row => {
                if (filter === 'all') {
                    row.style.display = '';
                } else {
                    const text = row.textContent.toLowerCase();
                    row.style.display = text.includes(filter.toLowerCase()) ? '' : 'none';
                }
            });
        });

        function deleteReport(id) {
            if (confirm('Are you sure you want to delete this report?')) {
                showToast('🗑️ Report deleted (simulated)');
                loadReports();
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        document.addEventListener('DOMContentLoaded', loadReports);
        window.showToast = showToast;
    </script>
</body>
  </html>
